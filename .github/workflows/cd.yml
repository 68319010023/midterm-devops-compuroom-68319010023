name: CD - compuroom

# ────────────────────────────────────────────────
# Trigger: push ไปยัง main เท่านั้น (หลัง PR merge)
# ────────────────────────────────────────────────
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      # Step 1: ดึง source code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Login เข้า Docker Hub ด้วย Secret
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Build และ Push Backend Image (-api)
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/compuroom-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/compuroom-api:v1.0.0

      # Step 4: Build และ Push Frontend Image (-web)
      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/compuroom-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/compuroom-web:v1.0.0